# 生产环境配置 - 使用 MySQL 数据库

database:
  type: mysql
  mysql:
    url: jdbc:mysql://localhost:3306/drone_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/mysql/*.xml
  type-aliases-package: com.example.drone.domain.entity
  type-handlers-package: com.example.drone.common
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

spring:
  datasource:
    initialization-mode: always
    continue-on-error: true
    platform: mysql
    schema: classpath:schema-mysql.sql
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000
  redis:
    host: localhost
    port: 6379
    password:
  mail:
    host: smtp.qq.com
    port: 587
    username: "${MAIL_USERNAME:your_qq_email@qq.com}"
    password: "${MAIL_PASSWORD:your_qq_smtp_authorization_code}"
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

logging:
  level:
    root: INFO
    com.example.drone: INFO
  pattern:
    console: "%d{yyyy-MM-DD HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

jwt:
  secret: "${JWT_SECRET:your_jwt_secret_key_at_least_256_bits}"
  access-token-expiration: 7200
  refresh-token-expiration: 604800
