<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>飞行任务 — 无人机管理系统</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <script>
  ;(function(){var t=localStorage.getItem('accessToken');if(!t||t==='null'||t==='undefined'){localStorage.clear();location.href='/login';return;}try{if(JSON.parse(atob(t.split('.')[1])).exp*1000<Date.now()){localStorage.clear();location.href='/login';}}catch(e){localStorage.clear();location.href='/login';}})();
  </script>
  <style>
    .nav-tabs{display:flex;gap:6px;margin-bottom:20px;padding:6px;border-radius:50px;background:rgba(255,255,255,0.45);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 4px 30px rgba(0,0,0,0.06),inset 0 0 0 1px rgba(255,255,255,0.6)}
    .nav-tab{flex:1;text-align:center;padding:10px 16px;border-radius:50px;color:var(--text-regular);text-decoration:none;font-size:14px;font-weight:500;transition:all 0.35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
    .nav-tab:hover{background:rgba(255,255,255,0.55);color:var(--color-primary);box-shadow:inset 0 0 0 1px rgba(64,158,255,0.15)}
    .nav-tab.active{background:rgba(255,255,255,0.85);color:var(--color-primary);font-weight:600;box-shadow:0 2px 12px rgba(64,158,255,0.15),inset 0 0 0 1.5px rgba(64,158,255,0.25)}
  </style>
</head>
<body>
<div class="app-wrapper">
  <div class="nav-tabs">
    <a href="/dashboard" class="nav-tab">📊 仪表盘</a>
    <a href="/drones" class="nav-tab">🚁 无人机管理</a>
    <a href="/missions" class="nav-tab active">📋 飞行任务</a>
    <a href="/flight-logs" class="nav-tab">📝 飞行日志</a>
    <a href="/maintenance" class="nav-tab">🔧 维护管理</a>
  </div>
  <div class="app-header"><div class="app-header-left"><span class="header-icon">📋</span><h2>飞行任务管理</h2></div></div>

  <div class="card"><div class="card-header"><span class="card-icon">+</span> 新建飞行任务</div>
  <div class="card-body">
    <div class="form-grid">
      <div class="form-group"><label class="form-label"><span class="required">无人机</span></label><select class="form-control" id="mDroneSelect"><option value="">请选择无人机</option></select></div>
      <div class="form-group"><label class="form-label"><span class="required">任务类型</span></label><select class="form-control" id="mType"><option value="">请选择</option><option value="INSPECTION">巡检</option><option value="AERIAL_PHOTOGRAPHY">航拍</option><option value="SURVEYING">测绘</option><option value="TRANSPORT">运输</option><option value="OTHER">其他</option></select></div>
      <div class="form-group"><label class="form-label"><span class="required">操作员</span></label><input type="text" class="form-control" id="mPilot" placeholder="操作员姓名" required></div>
      <div class="form-group"><label class="form-label">飞行区域</label><input type="text" class="form-control" id="mArea" placeholder="飞行区域"></div>
      <div class="form-group"><label class="form-label">计划开始时间</label><input type="datetime-local" class="form-control" id="mStart" onchange="document.getElementById('mEnd').setAttribute('min',this.value);var v=document.getElementById('mEnd').value;if(v&&v<=this.value)document.getElementById('mEnd').value=''"></div>
      <div class="form-group"><label class="form-label">计划结束时间</label><input type="datetime-local" class="form-control" id="mEnd"></div>
      <div class="form-group form-group-full"><label class="form-label">备注</label><input type="text" class="form-control" id="mRemarks" placeholder="备注信息"></div>
    </div>
    <div class="form-actions" style="margin-top:12px"><button class="btn btn-primary" id="submitBtn" onclick="createMission()">✓ 创建飞行任务</button></div>
  </div></div>

  <div class="card">
    <div class="card-header"><span class="card-icon">🔍</span> 查询条件</div>
    <div class="card-body">
      <div class="search-bar" style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
        <div class="search-item"><label>任务类型</label><select id="sMissionType"><option value="">全部</option><option value="INSPECTION">巡检</option><option value="AERIAL_PHOTOGRAPHY">航拍</option><option value="SURVEYING">测绘</option><option value="TRANSPORT">运输</option><option value="OTHER">其他</option></select></div>
        <div class="search-item"><label>状态</label><select id="sStatus"><option value="">全部</option><option value="PENDING">待执行</option><option value="IN_PROGRESS">执行中</option><option value="COMPLETED">已完成</option><option value="CANCELLED">已取消</option></select></div>
        <div class="search-item"><label>操作员</label><input type="text" id="sPilot" placeholder="操作员姓名（精准匹配）"></div>
        <div class="search-item"><label>开始时间</label><input type="datetime-local" id="sStartFrom"></div>
        <div class="search-item"><label>结束时间</label><input type="datetime-local" id="sStartTo"></div>
        <div class="search-actions"><button class="btn btn-primary" onclick="loadData()">🔍 查询</button></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-icon">📋</span> 任务列表 <span class="card-extra" id="totalText"></span></div>
    <div class="card-body no-padding"><table class="data-table" id="dataTable"></table></div>
  </div>
</div>

<div id="editOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:12px;padding:24px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)">
    <h3 style="margin-bottom:16px">修改飞行任务</h3>
    <input type="hidden" id="editId">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div><label style="font-size:13px;font-weight:600">无人机ID</label><input class="form-control" id="editDroneId" readonly></div>
      <div><label style="font-size:13px;font-weight:600">任务类型</label><select class="form-control" id="editType"><option value="">请选择</option><option value="INSPECTION">巡检</option><option value="AERIAL_PHOTOGRAPHY">航拍</option><option value="SURVEYING">测绘</option><option value="TRANSPORT">运输</option><option value="OTHER">其他</option></select></div>
      <div><label style="font-size:13px;font-weight:600">操作员</label><input class="form-control" id="editPilot"></div>
      <div><label style="font-size:13px;font-weight:600">飞行区域</label><input class="form-control" id="editArea"></div>
      <div><label style="font-size:13px;font-weight:600">计划开始时间</label><input type="datetime-local" class="form-control" id="editStart" onchange="document.getElementById('editEnd').setAttribute('min',this.value);var v=document.getElementById('editEnd').value;if(v&&v<=this.value)document.getElementById('editEnd').value=''"></div>
      <div><label style="font-size:13px;font-weight:600">计划结束时间</label><input type="datetime-local" class="form-control" id="editEnd"></div>
    </div>
    <div style="margin-top:12px"><label style="font-size:13px;font-weight:600">备注</label><input class="form-control" id="editRemarks"></div>
    <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-default" onclick="closeEdit()">取消</button>
      <button class="btn btn-primary" onclick="saveEdit()">保存修改</button>
    </div>
  </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
var droneMap = {};
function loadDrones(){
  Api.get('/api/v1/drones?pageSize=500').then(function(r){
    var drones = r.data.list||[];
    var sel = document.getElementById('mDroneSelect');
    drones.forEach(function(d){
      droneMap[d.id] = d.serialNumber;
      var opt = document.createElement('option');
      opt.value = d.id;
      opt.textContent = d.serialNumber + ' (' + d.modelName + ')';
      sel.appendChild(opt);
    });
  }).catch(function(e){ Toast.error('加载无人机列表失败: '+e.message); });
}

function fmtDt(v){ if(!v)return '-'; return v.replace(' ','T').substring(0,16); }
function fmtDtTxt(v){ if(!v)return '-'; return v; }

function loadData(){
  var p = ['missionType='+($('#sMissionType').value||'')];
  p.push('status='+($('#sStatus').value||''));
  p.push('pilotName='+($('#sPilot').value||''));
  p.push('startFrom='+($('#sStartFrom').value?$('#sStartFrom').value.replace('T',' ')+':00':''));
  p.push('startTo='+($('#sStartTo').value?$('#sStartTo').value.replace('T',' ')+':00':''));
  p.push('pageNum=1&pageSize=100');
  var viewingCancelled = ($('#sStatus').value==='CANCELLED');
  Api.get('/api/v1/missions?'+p.join('&')).then(function(r){
    var list = r.data.list||[];
    document.getElementById('totalText').textContent = '共 '+list.length+' 条';
    var h = '<thead><tr><th>任务编号</th><th>无人机</th><th>任务类型</th><th>状态</th><th>操作员</th><th>飞行区域</th><th>计划开始</th><th>计划结束</th><th>操作</th></tr></thead><tbody>';
    if(list.length===0){h+='<tr><td colspan="9"><div class="empty-state"><div class="empty-title">暂无飞行任务</div></div></td></tr>';}
    else{list.forEach(function(m){
      var tagClass = m.status==='待执行'?'tag-info':m.status==='执行中'?'tag-warning':m.status==='已完成'?'tag-success':'tag-danger';
      h+='<tr><td><strong>'+m.missionCode+'</strong></td><td>'+ (m.droneSerialNumber||m.droneId)+'</td><td>'+m.missionType+'</td><td><span class="tag '+tagClass+'">'+m.status+'</span></td><td>'+m.pilotName+'</td><td>'+ (m.flightArea||'-')+'</td><td>'+fmtDtTxt(m.plannedStartTime)+'</td><td>'+fmtDtTxt(m.plannedEndTime)+'</td><td style="white-space:nowrap"><button class="btn-link" onclick="openEdit('+m.id+')">✎ 修改</button> ';
      if(!viewingCancelled){
        h+='<button class="btn-link danger" onclick="cancelMission('+m.id+',\''+m.missionCode+'\')">✕ 取消</button>';
      } else {
        h+='<button class="btn-link" onclick="restoreMission('+m.id+',\''+m.missionCode+'\')">↩ 恢复</button> ';
        h+='<button class="btn-link danger" onclick="permanentDelete('+m.id+',\''+m.missionCode+'\')">🗑 最终删除</button>';
      }
      h+='</td></tr>';
    });}
    h+='</tbody>';
    document.getElementById('dataTable').innerHTML = h;
  }).catch(function(e){ Toast.error('加载任务列表失败: '+e.message); });
}

function createMission(){
  var droneId = parseInt(document.getElementById('mDroneSelect').value);
  var missionType = document.getElementById('mType').value;
  var pilotName = document.getElementById('mPilot').value;
  if(!droneId||!missionType||!pilotName){Toast.warning('请填写必填字段');return;}
  var startVal = document.getElementById('mStart').value;
  var endVal = document.getElementById('mEnd').value;
  if(startVal && endVal && endVal <= startVal){Toast.warning('结束时间必须晚于开始时间');return;}
  var data = {
    droneId: droneId, missionType: missionType, pilotName: pilotName,
    flightArea: document.getElementById('mArea').value,
    plannedStartTime: startVal ? startVal.replace('T',' ')+':00' : null,
    plannedEndTime: endVal ? endVal.replace('T',' ')+':00' : null,
    remarks: document.getElementById('mRemarks').value
  };
  var btn = document.getElementById('submitBtn');btn.classList.add('btn-loading');btn.disabled=true;
  Api.post('/api/v1/missions',data).then(function(){
    btn.classList.remove('btn-loading');btn.disabled=false;
    Toast.success('创建成功');loadData();
    document.getElementById('mType').value='';document.getElementById('mPilot').value='';
    document.getElementById('mArea').value='';document.getElementById('mStart').value='';
    document.getElementById('mEnd').value='';document.getElementById('mEnd').removeAttribute('min');document.getElementById('mRemarks').value='';
  }).catch(function(e){btn.classList.remove('btn-loading');btn.disabled=false;Toast.error(e.message);});
}

// 匹配后端枚举→中文的映射，用于反向查找value
var typeMap = {'巡检':'INSPECTION','航拍':'AERIAL_PHOTOGRAPHY','测绘':'SURVEYING','运输':'TRANSPORT','其他':'OTHER'};

function openEdit(id){
  Api.get('/api/v1/missions/'+id).then(function(r){
    var m = r.data;
    document.getElementById('editId').value = m.id;
    document.getElementById('editDroneId').value = m.droneSerialNumber||m.droneId;
    var tVal = typeMap[m.missionType]||'';
    document.getElementById('editType').value = tVal;
    document.getElementById('editPilot').value = m.pilotName||'';
    document.getElementById('editArea').value = m.flightArea||'';
    document.getElementById('editStart').value = fmtDt(m.plannedStartTime);
    document.getElementById('editEnd').setAttribute('min', fmtDt(m.plannedStartTime));
    document.getElementById('editEnd').value = fmtDt(m.plannedEndTime);
    document.getElementById('editRemarks').value = m.remarks||'';
    document.getElementById('editOverlay').style.display = 'flex';
  }).catch(function(e){ Toast.error(e.message); });
}
function closeEdit(){ document.getElementById('editOverlay').style.display = 'none'; }
function saveEdit(){
  var id = document.getElementById('editId').value;
  var sVal = document.getElementById('editStart').value;
  var eVAl = document.getElementById('editEnd').value;
  if(sVal && eVAl && eVAl <= sVal){Toast.warning('结束时间必须晚于开始时间');return;}
  var data = {
    missionType: document.getElementById('editType').value,
    pilotName: document.getElementById('editPilot').value,
    flightArea: document.getElementById('editArea').value,
    plannedStartTime: sVal ? sVal.replace('T',' ')+':00' : '',
    plannedEndTime: eVAl ? eVAl.replace('T',' ')+':00' : '',
    remarks: document.getElementById('editRemarks').value
  };
  Api.put('/api/v1/missions/'+id, data).then(function(r){
    closeEdit(); Toast.success('修改成功'); loadData();
  }).catch(function(e){ Toast.error(e.message); });
}

function cancelMission(id, code){
  Modal.confirm({title:'取消任务',message:'确定要取消任务 <strong>'+code+'</strong> 吗？<br><span style="color:#e6a23c;font-size:12px;">取消后可在"已取消"状态中查看</span>',type:'warning',onOk:function(){
    Api.del('/api/v1/missions/'+id).then(function(){Toast.success('已取消');loadData();}).catch(function(e){Toast.error(e.message);});
  }});
}
function restoreMission(id, code){
  Modal.confirm({title:'恢复任务',message:'确定要恢复任务 <strong>'+code+'</strong> 吗？<br><span style="color:#67c23a;font-size:12px;">该任务结束时间必须晚于当前系统时间才能恢复</span>',type:'info',onOk:function(){
    Api.post('/api/v1/missions/'+id+'/restore').then(function(r){Toast.success('恢复成功');loadData();}).catch(function(e){Toast.error(e.message);});
  }});
}
function permanentDelete(id, code){
  Modal.confirm({title:'彻底删除',message:'确定要<strong>永久删除</strong>任务 '+code+' 吗？<br><span style="color:#f56c6c;font-size:12px;">此操作不可恢复！</span>',type:'danger',onOk:function(){
    Api.del('/api/v1/missions/'+id+'/permanent').then(function(){Toast.success('已彻底删除');loadData();}).catch(function(e){Toast.error(e.message);});
  }});
}
document.getElementById('editOverlay').addEventListener('click',function(e){ if(e.target===this) closeEdit(); });
document.addEventListener('DOMContentLoaded',function(){loadDrones();loadData();});
</script>
</body>
</html>
