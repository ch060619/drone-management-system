<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MFA 双因素验证 — 无人机管理系统</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body{background:var(--bg-page);display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .mfa-card{background:var(--bg-card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);width:400px;padding:40px}
    .mfa-title{font-size:22px;font-weight:600;color:var(--text-primary);text-align:center;margin-bottom:8px}
    .mfa-subtitle{font-size:13px;color:var(--text-secondary);text-align:center;margin-bottom:28px}
    .mfa-icon{text-align:center;font-size:48px;margin-bottom:16px}
    .form-item{margin-bottom:18px}
    .form-item label{display:block;font-size:13px;font-weight:500;color:var(--text-regular);margin-bottom:6px}
    .form-item input{width:100%;padding:10px 12px;border:1px solid var(--border-base);border-radius:var(--radius-base);font-size:14px;box-sizing:border-box;text-align:center;letter-spacing:4px;font-size:18px}
    .form-item input:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 2px rgba(64,158,255,0.15)}
    .btn-mfa{width:100%;padding:12px;font-size:15px;margin-top:8px}
    .mfa-footer{text-align:center;margin-top:16px}
    .mfa-footer a{color:var(--color-primary);font-size:13px;text-decoration:none}
    .mfa-footer a:hover{text-decoration:underline}
    .mfa-hint{font-size:12px;color:var(--text-secondary);text-align:center;margin-top:12px;line-height:1.6}
  </style>
</head>
<body>
  <div class="mfa-card">
    <div class="mfa-icon">&#128274;</div>
    <div class="mfa-title">双因素认证</div>
    <div class="mfa-subtitle">请输入管理员动态验证码完成登录</div>

    <div class="form-item">
      <label>验证码</label>
      <input type="text" id="mfaCode" placeholder="请输入 6 位验证码" maxlength="6" autocomplete="one-time-code">
    </div>

    <button type="button" class="btn btn-primary btn-mfa" id="verifyBtn">验证并登录</button>

    <div class="mfa-footer">
      <a href="/login">&#8592; 返回登录</a>
    </div>
    <div class="mfa-hint">提示：开发环境下验证码为 <strong>123456</strong></div>
  </div>

  <script>
  ;(function() {
    var mfaToken = sessionStorage.getItem('mfaToken');
    if (!mfaToken) {
      window.location.href = '/login';
      return;
    }

    var verifyBtn = document.getElementById('verifyBtn');
    var codeInput = document.getElementById('mfaCode');

    function doVerify() {
      var code = codeInput.value.trim();
      if (code.length !== 6) {
        alert('请输入 6 位验证码');
        return;
      }
      verifyBtn.disabled = true;
      verifyBtn.textContent = '验证中...';

      fetch('/api/v1/auth/mfa-verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mfaToken: mfaToken, code: code })
      }).then(function(resp) { return resp.json(); }).then(function(body) {
        if (body.code === 200 && body.data) {
          localStorage.setItem('accessToken', body.data.accessToken);
          localStorage.setItem('refreshToken', body.data.refreshToken || '');
          sessionStorage.removeItem('mfaToken');
          window.location.href = '/dashboard';
        } else {
          alert(body.message || '验证码错误');
          verifyBtn.disabled = false;
          verifyBtn.textContent = '验证并登录';
        }
      }).catch(function() {
        alert('验证请求失败，请重试');
        verifyBtn.disabled = false;
        verifyBtn.textContent = '验证并登录';
      });
    }

    verifyBtn.addEventListener('click', doVerify);
    codeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doVerify();
    });
    codeInput.focus();
  })();
  </script>
</body>
</html>
