<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录 — 无人机管理系统</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden;min-height:100vh;display:flex;background:radial-gradient(ellipse at 0% 50%,rgba(59,130,246,.40) 0%,transparent 55%),radial-gradient(ellipse at 100% 0%,rgba(16,185,129,.32) 0%,transparent 55%),radial-gradient(ellipse at 80% 90%,rgba(250,204,21,.22) 0%,transparent 55%),radial-gradient(ellipse at 20% 100%,rgba(59,130,246,.18) 0%,transparent 55%),#fafbfd}
    .container{display:flex;width:100%;min-height:100vh}
    .left-panel{flex:1;position:relative;display:flex;flex-direction:column;justify-content:space-between;padding:48px;overflow:hidden;min-width:0}
    .dotted-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
    .glass-bg{position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.55) 0%,rgba(245,248,255,.38) 100%);backdrop-filter:blur(28px) saturate(200%);-webkit-backdrop-filter:blur(28px) saturate(200%);z-index:1;pointer-events:none;box-shadow:inset 0 1px 0 rgba(255,255,255,.85),inset 0 -.5px 0 rgba(255,255,255,.25),0 1px 4px rgba(100,120,160,.06);border-radius:inherit}
    .glass-bg::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(105deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.35) 35%,rgba(255,255,255,0) 50%,rgba(200,220,255,.12) 70%,rgba(255,255,255,0) 100%);-webkit-mask-image:linear-gradient(to bottom,black 0%,transparent 70%);mask-image:linear-gradient(to bottom,black 0%,transparent 70%)}
    .brand{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:600;position:relative;z-index:20;color:#1a1a2e}
    .brand-icon{width:32px;height:32px;background:rgba(0,0,0,.06);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .characters-area{position:relative;z-index:20;display:flex;align-items:flex-end;justify-content:center;height:500px;flex-shrink:0}
    .characters-wrapper{position:relative;width:550px;height:400px}
    .char{position:absolute;bottom:0;transition:transform .7s,height .7s,left .7s;transform-origin:bottom center}
    #purple{z-index:1;left:70px;width:180px;height:400px;background:#6C3FF5;border-radius:10px 10px 0 0}
    #purple .eyes{position:absolute;display:flex;gap:30px;transition:all .7s}
    #black{z-index:2;left:240px;width:120px;height:310px;background:#2D2D2D;border-radius:8px 8px 0 0}
    #black .eyes{position:absolute;display:flex;gap:24px;transition:all .7s}
    #orange{z-index:3;left:0;width:240px;height:200px;background:#FF9B6B;border-radius:120px 120px 0 0}
    #orange .eyes{position:absolute;display:flex;gap:30px;transition:all .2s}
    #yellow{z-index:4;left:310px;width:140px;height:230px;background:#E8D754;border-radius:70px 70px 0 0}
    #yellow .eyes{position:absolute;display:flex;gap:22px;transition:all .2s}
    .mouth{position:absolute;width:80px;height:4px;background:#2D2D2D;border-radius:2px;transition:all .2s}
    .eye{display:flex;align-items:center;justify-content:center;overflow:hidden;transition:height .15s}
    .pupil{border-radius:50%;transition:transform .1s}
    .right-panel{flex:1;display:flex;align-items:center;justify-content:center;padding:48px;background:#fff;min-width:420px;border-left:1px solid #e5e7eb}
    .login-card{width:100%;max-width:420px}
    .login-header{text-align:center;margin-bottom:40px}
    .login-header h1{font-size:30px;font-weight:700;color:#1a1a2e;margin-bottom:8px}
    .login-header p{font-size:14px;color:#909399}
    .form-control{width:100%;height:48px;border:1.5px solid #e0e0e0;border-radius:10px;padding:0 16px;font-size:14px;outline:none;transition:border .2s;background:#fafafa;box-sizing:border-box}
    .form-control:focus{border-color:#6C3FF5;background:#fff}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#606266;margin-bottom:6px}
    .pwd-wrapper{position:relative}
    .pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#999;padding:4px}
    .pwd-toggle:hover{color:#333}
    .login-btn{width:100%;height:48px;background:#6C3FF5;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s}
    .login-btn:hover{background:#5B21B6;transform:translateY(-1px)}
    .login-btn:disabled{opacity:.6;cursor:not-allowed}
    .error-msg{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:12px;border-radius:8px;font-size:13px;margin-top:12px;display:none}
    .login-footer{text-align:center;margin-top:24px;font-size:13px;color:#909399}
    .login-footer a{color:#6C3FF5;text-decoration:none;font-weight:600}
    .login-footer a:hover{text-decoration:underline}
    .extra-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px}
    .extra-row a{color:#6C3FF5;text-decoration:none}
    .extra-row a:hover{text-decoration:underline}
    @media(max-width:900px){.container{flex-direction:column}.left-panel{display:none}.right-panel{min-width:auto;padding:24px}}
  </style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <div class="glass-bg"></div>
    <svg class="dotted-bg" xmlns="http://www.w3.org/2000/svg" height="100%" width="100%"><defs><pattern patternUnits="userSpaceOnUse" height="30" width="30" id="dots"><circle fill="rgba(0,0,0,.12)" r="1" cy="2" cx="2"/></pattern></defs><rect fill="url(#dots)" height="100%" width="100%"/></svg>
    <div class="brand"><div class="brand-icon">✦</div>DroneMS</div>
    <div class="characters-area">
      <div class="characters-wrapper">
        <div class="char" id="purple"><div class="eyes" id="purpleEyes"><div class="eye" id="pe1"><div class="pupil" id="pp1"></div></div><div class="eye" id="pe2"><div class="pupil" id="pp2"></div></div></div></div>
        <div class="char" id="black"><div class="eyes" id="blackEyes"><div class="eye" id="be1"><div class="pupil" id="bp1"></div></div><div class="eye" id="be2"><div class="pupil" id="bp2"></div></div></div></div>
        <div class="char" id="orange"><div class="eyes" id="orangeEyes"><div class="eye" id="oe1"><div class="pupil" id="op1"></div></div><div class="eye" id="oe2"><div class="pupil" id="op2"></div></div></div></div>
        <div class="char" id="yellow"><div class="eyes" id="yellowEyes"><div class="eye" id="ye1"><div class="pupil" id="yp1"></div></div><div class="eye" id="ye2"><div class="pupil" id="yp2"></div></div></div><div class="mouth" id="yellowMouth"></div></div>
      </div>
    </div>
    <div style="position:relative;z-index:20;display:flex;gap:32px;font-size:13px;color:rgba(0,0,0,.45)">
      <a href="#" style="color:inherit;text-decoration:none">Privacy Policy</a>
      <a href="#" style="color:inherit;text-decoration:none">Terms of Service</a>
      <a href="#" style="color:inherit;text-decoration:none">Contact</a>
    </div>
  </div>
  <div class="right-panel">
    <div class="login-card">
      <div class="login-header"><h1>欢迎回来！</h1><p>请输入您的登录信息</p></div>
      <form id="loginForm" onsubmit="return doLogin(event)">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" class="form-control" id="email" placeholder="admin@drone.com" autocomplete="off" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <div class="pwd-wrapper">
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
            <button type="button" class="pwd-toggle" id="pwdToggle" onclick="togglePwd()">👁</button>
          </div>
        </div>
        <div class="extra-row">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#606266">
            <input type="checkbox" id="rememberMe" style="accent-color:#6C3FF5"> 记住我
          </label>
          <a href="#">忘记密码？</a>
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" class="login-btn" id="loginBtn">登 录</button>
        <div class="login-footer">还没有账号？<a href="/register">立即注册</a></div>
      </form>
    </div>
  </div>
</div>

<script th:src="@{/js/common.js}"></script>
<script>
(function(){
  var mx=0,my=0,isTyping=false,showPwd=false,pwdVal='';
  var isPurpleBlinking=false,isBlackBlinking=false,isLookingAtEachOther=false,isPurplePeeking=false;
  var peekTimer=null;

  window.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY});

  function scheduleBlink(setter){
    var t=setTimeout(function(){setter(true);setTimeout(function(){setter(false);scheduleBlink(setter)},150)},Math.random()*4000+3000);
    return t;
  }
  scheduleBlink(function(v){isPurpleBlinking=v});
  scheduleBlink(function(v){isBlackBlinking=v});

  document.getElementById('email').addEventListener('focus',function(){isTyping=true;isLookingAtEachOther=true;setTimeout(function(){isLookingAtEachOther=false},800)});
  document.getElementById('email').addEventListener('blur',function(){isTyping=false});
  document.getElementById('password').addEventListener('input',function(){pwdVal=this.value});

  window.togglePwd=function(){
    showPwd=!showPwd;var p=document.getElementById('password');p.type=showPwd?'text':'password';
    document.getElementById('pwdToggle').textContent=showPwd?'🙈':'👁';
    if(showPwd&&pwdVal.length>0) startPeeking(); else stopPeeking();
  };
  function startPeeking(){stopPeeking();function schedulePeek(){peekTimer=setTimeout(function(){isPurplePeeking=true;setTimeout(function(){isPurplePeeking=false;schedulePeek()},800)},Math.random()*3000+2000)}schedulePeek()}
  function stopPeeking(){if(peekTimer){clearTimeout(peekTimer);peekTimer=null}isPurplePeeking=false}

  function calcPos(el){if(!el)return{faceX:0,faceY:0,bSkew:0};var r=el.getBoundingClientRect();var cx=r.left+r.width/2;var cy=r.top+r.height/3;var dx=mx-cx;var dy=my-cy;return{faceX:Math.max(-15,Math.min(15,dx/20)),faceY:Math.max(-10,Math.min(10,dy/30)),bSkew:Math.max(-6,Math.min(6,-dx/120))}}
  function updatePupil(eyeEl,maxDist){if(!eyeEl)return{x:0,y:0};var r=eyeEl.getBoundingClientRect();var cx=r.left+r.width/2;var cy=r.top+r.height/2;var dx=mx-cx;var dy=my-cy;var dist=Math.min(Math.sqrt(dx*dx+dy*dy),maxDist);var a=Math.atan2(dy,dx);return{x:Math.cos(a)*dist,y:Math.sin(a)*dist}}

  function render(){
    var purple=document.getElementById('purple'),black=document.getElementById('black'),orange=document.getElementById('orange'),yellow=document.getElementById('yellow');
    var pp=calcPos(purple),bp=calcPos(black),op=calcPos(orange),yp=calcPos(yellow);

    purple.style.transform='skewX('+(showPwd?0:(isTyping||(pwdVal.length>0&&!showPwd)?((pp.bSkew||0)-12):(pp.bSkew||0)))+'deg)'+(isTyping||(pwdVal.length>0&&!showPwd)?' translateX(40px)':'');
    purple.style.height=(isTyping||(pwdVal.length>0&&!showPwd))?'440px':'400px';
    var pe=document.getElementById('purpleEyes');
    pe.style.left=(showPwd?'20px':(isLookingAtEachOther?'55px':(45+pp.faceX)+'px'));
    pe.style.top=(showPwd?'35px':(isLookingAtEachOther?'65px':(40+pp.faceY)+'px'));

    black.style.transform='skewX('+(showPwd?0:(isLookingAtEachOther?((bp.bSkew||0)*1.5+10):((isTyping||(pwdVal.length>0&&!showPwd))?((bp.bSkew||0)*1.5):(bp.bSkew||0))))+'deg)'+(isLookingAtEachOther?' translateX(20px)':'');
    var be=document.getElementById('blackEyes');
    be.style.left=(showPwd?'10px':(isLookingAtEachOther?'32px':(26+bp.faceX)+'px'));
    be.style.top=(showPwd?'28px':(isLookingAtEachOther?'12px':(32+bp.faceY)+'px'));

    orange.style.transform='skewX('+(showPwd?0:(op.bSkew||0))+'deg)';
    var oe=document.getElementById('orangeEyes');
    oe.style.left=(showPwd?'50px':(82+(op.faceX||0))+'px');
    oe.style.top=(showPwd?'85px':(90+(op.faceY||0))+'px');

    yellow.style.transform='skewX('+(showPwd?0:(yp.bSkew||0))+'deg)';
    var ye=document.getElementById('yellowEyes');
    ye.style.left=(showPwd?'20px':(52+(yp.faceX||0))+'px');
    ye.style.top=(showPwd?'35px':(40+(yp.faceY||0))+'px');
    var ym=document.getElementById('yellowMouth');
    ym.style.left=(showPwd?'10px':(40+(yp.faceX||0))+'px');
    ym.style.top=(showPwd?'88px':(88+(yp.faceY||0))+'px');

    ['pe1','pe2'].forEach(function(id){var el=document.getElementById(id);el.style.width='18px';el.style.height=isPurpleBlinking?'2px':'18px';el.style.borderRadius='50%';el.style.background='#fff'});
    ['pp1','pp2'].forEach(function(id){var el=document.getElementById(id);el.style.width='7px';el.style.height='7px';el.style.background='#2D2D2D';
      var flx=showPwd?(isPurplePeeking?4:-4):(isLookingAtEachOther?3:undefined);
      var fly=showPwd?(isPurplePeeking?5:-4):(isLookingAtEachOther?4:undefined);
      if(flx!==undefined){el.style.transform='translate('+flx+'px,'+fly+'px)'}else{var ppu=updatePupil(document.getElementById('pe1'),5);el.style.transform='translate('+ppu.x+'px,'+ppu.y+'px)'}
    });
    ['be1','be2'].forEach(function(id){var el=document.getElementById(id);el.style.width='16px';el.style.height=isBlackBlinking?'2px':'16px';el.style.borderRadius='50%';el.style.background='#fff'});
    ['bp1','bp2'].forEach(function(id){var el=document.getElementById(id);el.style.width='6px';el.style.height='6px';el.style.background='#2D2D2D';
      var flx=showPwd?-4:(isLookingAtEachOther?0:undefined);
      var fly=showPwd?-4:(isLookingAtEachOther?-4:undefined);
      if(flx!==undefined){el.style.transform='translate('+flx+'px,'+fly+'px)'}else{var bpu=updatePupil(document.getElementById('be1'),4);el.style.transform='translate('+bpu.x+'px,'+bpu.y+'px)'}
    });
    ['oe1','oe2'].forEach(function(id){var el=document.getElementById(id);el.style.width='12px';el.style.height='12px';el.style.borderRadius='50%';el.style.background='#2D2D2D'});
    ['op1','op2'].forEach(function(id){var el=document.getElementById(id);el.style.width='12px';el.style.height='12px';el.style.background='#2D2D2D';
      var flx=showPwd?-5:undefined;var fly=showPwd?-4:undefined;
      if(flx!==undefined){el.style.transform='translate('+flx+'px,'+fly+'px)'}else{var opu=updatePupil(document.getElementById('oe1'),5);el.style.transform='translate('+opu.x+'px,'+opu.y+'px)'}
    });
    ['ye1','ye2'].forEach(function(id){var el=document.getElementById(id);el.style.width='12px';el.style.height='12px';el.style.borderRadius='50%';el.style.background='#2D2D2D'});
    ['yp1','yp2'].forEach(function(id){var el=document.getElementById(id);el.style.width='12px';el.style.height='12px';el.style.background='#2D2D2D';
      var flx=showPwd?-5:undefined;var fly=showPwd?-4:undefined;
      if(flx!==undefined){el.style.transform='translate('+flx+'px,'+fly+'px)'}else{var ypu=updatePupil(document.getElementById('ye1'),5);el.style.transform='translate('+ypu.x+'px,'+ypu.y+'px)'}
    });
    requestAnimationFrame(render);
  }
  render();

  window.doLogin=function(e){e.preventDefault();
    var btn=document.getElementById('loginBtn'),errEl=document.getElementById('errorMsg');
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('password').value;
    var rememberMe=document.getElementById('rememberMe').checked;
    if(!email||!password){errEl.textContent='请填写邮箱和密码';errEl.style.display='block';return false}
    btn.disabled=true;btn.textContent='登录中...';errEl.style.display='none';
    fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({account:email,password:password,captcha:'dev',rememberMe:rememberMe})
    }).then(function(r){return r.json().then(function(data){return {ok:r.ok,data:data}})})
    .then(function(res){
      if(res.ok&&res.data.code===200){
        var d=res.data.data;
        if(d.mfaRequired){
          sessionStorage.setItem('mfaToken',d.mfaToken);
          window.location.href='/mfa';
          return;
        }
        localStorage.setItem('accessToken',d.accessToken);
        localStorage.setItem('refreshToken',d.refreshToken||'');
        localStorage.setItem('userInfo',JSON.stringify(d.userInfo));
        window.location.href='/drones';
      }else{
        errEl.textContent=res.data.message||'登录失败';
        errEl.style.display='block';btn.disabled=false;btn.textContent='登 录';
      }
    }).catch(function(){errEl.textContent='网络错误，请重试';errEl.style.display='block';btn.disabled=false;btn.textContent='登 录'});
    return false
  };
})();
</script>
</body>
</html>
